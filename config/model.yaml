clustering:
  algorithm: ward_hac
  spatial_constraint: queen_contiguity
  layer1_assignment: hard
  layer2_assignment: soft
  k: 5
  k_candidates:
  - 5
  - 7
  - 10
  - 12
  - 15
  - 20
  - 25
  - 30
  min_community_size: 8
types:
  # Legacy NMF config (retained for comparison)
  legacy_algorithm: nmf
  legacy_j: 7
  # Type-primary config (active)
  algorithm: kmeans
  fallback_algorithms:
  - archetypal_analysis
  - semi_nmf
  j: 100
  j_candidates:
  - 30
  - 40
  - 50
  - 60
  - 70
  - 80
  - 90
  - 100
  - 120
  - 150
  super_type_count_candidates:
  - 5
  lambda_shrinkage: 0.75
  # covariance_max_rank: 18  # Available but inactive — observed comovement is ~3-dimensional (not 18), and shrinkage already reduces effective rank to ~2. Activate after adding features that genuinely predict electoral comovement.
  covariance_acceptance_threshold: 0.4
  holdout_r_minimum: 0.85
  holdout_r_target: 0.90
  temperature: 10.0
  presidential_weight: 8.0
