<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>US Political Community Types — FL · GA · AL</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" />
  <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/deck.gl@latest/dist.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: #080a0d;
      overflow: hidden;
      font-family: 'JetBrains Mono', monospace;
    }

    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    /* ── Header ─────────────────────────────────────────────── */
    #header {
      position: absolute;
      top: 22px;
      left: 22px;
      z-index: 100;
      pointer-events: none;
    }

    #header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 21px;
      font-weight: 600;
      letter-spacing: 0.03em;
      color: #ddd8cf;
      line-height: 1.2;
      text-shadow: 0 2px 12px rgba(0,0,0,0.8);
    }

    #header .subtitle {
      margin-top: 5px;
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #4a4f5a;
    }

    /* ── Legend ─────────────────────────────────────────────── */
    #legend {
      position: absolute;
      bottom: 36px;
      left: 22px;
      z-index: 100;
      background: rgba(8, 10, 13, 0.86);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 5px;
      padding: 13px 15px 11px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    #legend .legend-title {
      font-size: 8.5px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #3d4248;
      margin-bottom: 11px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 8px;
    }

    .legend-item:last-child { margin-bottom: 0; }

    .swatch {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
      opacity: 0.85;
    }

    .legend-label {
      font-size: 10px;
      color: #7a8090;
      letter-spacing: 0.01em;
      white-space: nowrap;
    }

    /* ── Note ───────────────────────────────────────────────── */
    #note {
      position: absolute;
      bottom: 36px;
      right: 22px;
      z-index: 100;
      font-size: 9px;
      letter-spacing: 0.06em;
      color: #2e323a;
      line-height: 1.7;
      text-align: right;
      pointer-events: none;
    }

    /* ── Tooltip ─────────────────────────────────────────────── */
    .deckgl-tooltip {
      position: absolute !important;
      background: rgba(8, 10, 13, 0.95) !important;
      border: 1px solid rgba(255, 255, 255, 0.10) !important;
      border-radius: 5px !important;
      padding: 11px 14px !important;
      backdrop-filter: blur(14px) !important;
      max-width: 270px !important;
      pointer-events: none !important;
      color: #c8c4bc !important;
      font-family: 'JetBrains Mono', monospace !important;
      font-size: 11px !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
    }

    .tt-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      font-weight: 600;
      color: #e4dfd7;
      padding-left: 10px;
      margin-bottom: 5px;
      line-height: 1.3;
    }

    .tt-pct {
      font-size: 9.5px;
      letter-spacing: 0.07em;
      color: #4a5060;
      padding-left: 10px;
      margin-bottom: 8px;
    }

    .tt-divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.06);
      margin: 6px 0;
    }

    .tt-row {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      font-size: 9.5px;
      color: #555c6a;
      line-height: 1.8;
    }

    .tt-row .tt-comp { color: #4a5060; }
    .tt-row .tt-val  { color: #717880; font-variant-numeric: tabular-nums; }

    /* ── Loading ─────────────────────────────────────────────── */
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      gap: 14px;
      background: #080a0d;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 1.5px solid rgba(255,255,255,0.05);
      border-top-color: rgba(255,255,255,0.22);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    .load-text {
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #2e3240;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── MapLibre attribution ─────────────────────────────────── */
    .maplibregl-ctrl-bottom-right { bottom: 10px !important; right: 10px !important; }
    .maplibregl-ctrl-attrib { background: transparent !important; }
    .maplibregl-ctrl-attrib a { color: #2e3240 !important; font-size: 9px !important; }
  </style>
</head>

<body>
  <div id="app">
    <div id="loading">
      <div class="spinner"></div>
      <div class="load-text">Loading community data…</div>
    </div>
  </div>

  <div id="header">
    <h1>Political Community Types</h1>
    <div class="subtitle">Florida · Georgia · Alabama &ensp;·&ensp; 2020 census tracts</div>
  </div>

  <div id="legend">
    <div class="legend-title">Community</div>
    <!-- Populated by JS -->
  </div>

  <div id="note">
    Colors blend top-2 communities per tract.<br>
    Hover for community breakdown.
  </div>

  <script>
    // Path is relative to the server root when served via:
    //   python -m http.server 8080  (from project root)
    // and opened at: http://localhost:8080/src/viz/community_map.html
    const DATA_URL = '/data/viz/tract_memberships_k7_blended.geojson';

    const COMMUNITIES = [
      { id: 'c1', label: 'White rural homeowner',   color: [160,  82,  45] },
      { id: 'c2', label: 'Black urban',             color: [ 30, 100, 200] },
      { id: 'c3', label: 'Knowledge worker',        color: [ 46, 160, 110] },
      { id: 'c4', label: 'Asian',                   color: [128,  72, 176] },
      { id: 'c5', label: 'Working-class homeowner', color: [210, 120,  40] },
      { id: 'c6', label: 'Hispanic low-income',     color: [200,  60,  60] },
      { id: 'c7', label: 'Generic suburban',        color: [150, 150, 155] },
    ];

    // Build lookups: label → hex, id → label
    const HEX_BY_LABEL = {};
    const LABEL_BY_ID = {};
    COMMUNITIES.forEach(c => {
      HEX_BY_LABEL[c.label] = '#' + c.color.map(v => v.toString(16).padStart(2, '0')).join('');
      LABEL_BY_ID[c.id] = c.label;
    });

    // Populate legend
    const legendEl = document.getElementById('legend');
    COMMUNITIES.forEach(c => {
      const hex = '#' + c.color.map(v => v.toString(16).padStart(2, '0')).join('');
      const item = document.createElement('div');
      item.className = 'legend-item';
      item.innerHTML = `
        <div class="swatch" style="background:${hex}"></div>
        <span class="legend-label">${c.label}</span>
      `;
      legendEl.appendChild(item);
    });

    // Load data and initialize deck.gl
    fetch(DATA_URL)
      .then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.json();
      })
      .then(geojson => {
        document.getElementById('loading').style.display = 'none';

        const { DeckGL, GeoJsonLayer } = deck;

        new DeckGL({
          container: document.getElementById('app'),
          mapLib: maplibregl,
          mapStyle: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
          initialViewState: {
            longitude: -83.5,
            latitude: 29.5,
            zoom: 5.8,
            bearing: 0,
            pitch: 0,
          },
          controller: true,

          layers: [
            new GeoJsonLayer({
              id: 'community-tracts',
              data: geojson,
              filled: true,
              stroked: false,
              getFillColor: d => {
                const fc = d.properties.fill_color;
                return fc || [0, 0, 0, 0];
              },
              pickable: true,
            }),
          ],

          getTooltip: ({ object }) => {
            if (!object) return null;
            const p = object.properties;
            if (!p || p.dominant_label === 'uninhabited' || !p.dominant_label) return null;

            const accentHex = HEX_BY_LABEL[p.dominant_label] || '#888';
            const pctStr = p.dominant_weight
              ? (p.dominant_weight * 100).toFixed(0) + '% dominant community'
              : '';

            // Parse weight_summary into rows
            const rows = (p.weight_summary || '')
              .split(' | ')
              .filter(Boolean)
              .map(s => {
                const [comp, val] = s.split(': ');
                const label = LABEL_BY_ID[comp] || comp;
                return `<div class="tt-row">
                  <span class="tt-comp">${label}</span>
                  <span class="tt-val">${val || ''}</span>
                </div>`;
              })
              .join('');

            return {
              html: `
                <div class="tt-name" style="border-left: 3px solid ${accentHex}">
                  ${p.dominant_label}
                </div>
                <div class="tt-pct">${pctStr}</div>
                ${rows ? `<hr class="tt-divider">${rows}` : ''}
              `,
              className: 'deckgl-tooltip',
            };
          },
        });
      })
      .catch(err => {
        const loadEl = document.getElementById('loading');
        loadEl.innerHTML = `
          <div class="load-text" style="color:#8b3a3a; letter-spacing:0.05em; text-align:center; line-height:2">
            Failed to load data.<br>
            Start server from project root:<br>
            <span style="color:#4a5060">python -m http.server 8080</span>
          </div>
        `;
        console.error('Data load error:', err);
      });
  </script>
</body>
</html>
