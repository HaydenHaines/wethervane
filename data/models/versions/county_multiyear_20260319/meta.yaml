version: county_multiyear_20260319
role: previous
k: 7
shift_type: raw
vote_share_type: twoparty
description: >
  30-dim multi-year county model trained on 2000–2022 election pairs (4 presidential
  pairs via MEDSL + 5 governor pairs via Algara/Amlani), raw shift vectors, two-party
  vote share denominator. K=7 NMF types. Holdout r = 0.87 at k=5 (2016→2020 training
  vs 2020→2024 holdout). Slight degradation from 3-cycle baseline reflects temporal
  averaging over 20-year history; structural robustness is the intended tradeoff.
  Superseded by log-odds model (county_multiyear_logodds_20260319).
training_elections:
  - 2000_president
  - 2002_governor
  - 2004_president
  - 2006_governor
  - 2008_president
  - 2010_governor
  - 2012_president
  - 2014_governor
  - 2016_president
  - 2018_governor
  - 2020_president
  - 2022_governor
