notes: >
  Updated 2026-03-20: Senate shift dimensions added (8 class-aligned pairs x 3 dims
  = 24 new dims, total 54 training dims). K re-selected by holdout sweep: K=5
  (r=0.9034) vs previous K=10 (r=0.9027). Marginal improvement in holdout accuracy;
  K=5 produces larger, more geographically coherent communities at similar predictive
  power.
