version: county_multiyear_logodds_20260319
role: current
k: 5
j: 7
holdout_r: 0.9034
shift_type: logodds
vote_share_type: total
description: >
  54-dim multi-year county model trained on 2000–2022 election pairs (presidential +
  governor + Senate), log-odds shift vectors, total vote share denominator. Senate
  dims added 2026-03-20 via MEDSL/Algara county Senate data (8 class-aligned pairs:
  2002->2008 through 2016->2022). K=5 selected by holdout sweep (r=0.9034). Log-odds
  transformation ensures shift vectors are symmetric and unbounded. Total vote share
  denominator captures third-party and abstention effects. 54 training dims + 3
  holdout dims. FL+GA+AL pilot geography (293 counties). Covariance estimated via
  Stan factor model; poll propagation via Gaussian Bayesian update.
